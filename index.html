<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      name="pi-verification"
      content="acaba26db48cca57d14ab1798576b94acfd871cd13b684e772d5ec45cadd36b1fe324d988c13607ca433047d4cbb7220eabdb592abbd572d9d4511d295e397f1"
    />

    <title>Pi Freaking Math - Material Edition</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  </head>
  <body>
    <div id="app">
      <!-- Màn hình chào mừng -->
      <section id="welcome-screen" class="screen active">
        <div class="header-logo">
          <img src="pi_logo.png" class="app-logo" alt="Pi Logo" />
        </div>

        <div class="content-card">
          <h1 class="app-title">Freaking Math</h1>
          <p class="app-subtitle">Nâng cao khả năng tính toán của bạn</p>

          <div class="score-badge">
            <span class="label">KỶ LỤC</span>
            <span id="best-score-display" class="value">0</span>
          </div>

          <button id="btn-login" class="btn-material-primary">
            ĐĂNG NHẬP VỚI PI
          </button>
          <p class="note-text">Chơi để tích lũy điểm thưởng Pi Network</p>
        </div>
      </section>

      <!-- Màn hình chơi game -->
      <section id="game-screen" class="screen">
        <div class="game-top-bar">
          <div class="score-indicator">
            Điểm: <span id="current-score">0</span>
          </div>
          <div class="timer-track">
            <div id="timer-bar"></div>
          </div>
        </div>

        <div class="math-area">
          <div id="equation" class="equation-display">2 + 2 = 4</div>
        </div>

        <div class="action-grid">
          <button id="btn-true" class="btn-action btn-success">✓</button>
          <button id="btn-false" class="btn-action btn-danger">✕</button>
        </div>
      </section>

      <!-- Màn hình Game Over -->
      <section id="over-screen" class="screen">
        <div class="content-card result-card">
          <h2 class="status-title">KẾT THÚC!</h2>

          <div class="final-stats">
            <div class="stat-item">
              <span class="stat-label">ĐIỂM SỐ</span>
              <strong id="final-score">0</strong>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
              <span class="stat-label">KỶ LỤC</span>
              <strong id="high-score">0</strong>
            </div>
          </div>

          <div class="player-info">
            <img
              src=""
              id="user-avatar"
              class="user-img"
              style="display: none"
            />
            <span id="username">Guest</span>
          </div>

          <button id="btn-restart" class="btn-material-secondary">
            CHƠI LẠI
          </button>
          <button id="btn-home" class="btn-text">QUAY VỀ MÀN HÌNH CHÍNH</button>
        </div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
